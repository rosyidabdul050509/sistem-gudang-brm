<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e28;
  --border:#2a2a38;--border2:#333344;
  --text:#f0f0f5;--text2:#9898b0;--text3:#5a5a70;
  --accent:#7c6ef5;--accent2:#a594f9;--accent-glow:rgba(124,110,245,.18);
  --green:#2dd4a0;--green-dim:rgba(45,212,160,.12);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,.12);
  --red:#f55a5a;--red-dim:rgba(245,90,90,.12);
  --blue:#5a9cf5;--blue-dim:rgba(90,156,245,.12);
  --teal:#22d3ee;--teal-dim:rgba(34,211,238,.12);
  --r:10px;--r2:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{padding:16px 14px;border-bottom:1px solid var(--border)}
.brand-logo-wrap{display:flex;align-items:center;gap:10px}
.brand-img{width:42px;height:42px;object-fit:contain;border-radius:8px;flex-shrink:0}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.3px}
.brand-sub{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
.conn-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:99px;font-size:10px;font-family:'DM Mono',monospace;border:1px solid var(--border2);color:var(--text2);margin-top:8px;background:var(--bg3)}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.conn-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}.conn-dot.err{background:var(--red)}.conn-dot.loading{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nav{flex:1;padding:10px 8px}
.nav-section{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.12em;color:var(--text3);padding:10px 8px 5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r2);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;margin-bottom:1px;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent2);border-color:rgba(124,110,245,.25)}
.nav-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:10}
.page-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.3px}
.page-sub{font-size:11px;color:var(--text3);margin-top:1px}
.content{padding:18px 22px;flex:1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.card-title{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.08em;color:var(--text3);text-transform:uppercase}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-bottom:12px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:36px;height:36px;border-radius:0 var(--r2) 0 36px;opacity:.15}
.stat-card.green::before{background:var(--green)}.stat-card.amber::before{background:var(--amber)}.stat-card.red::before{background:var(--red)}.stat-card.blue::before{background:var(--blue)}.stat-card.teal::before{background:var(--teal)}
.stat-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.06em;margin-bottom:5px;text-transform:uppercase}
.stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;line-height:1}
.stat-val.green{color:var(--green)}.stat-val.amber{color:var(--amber)}.stat-val.red{color:var(--red)}.stat-val.blue{color:var(--blue)}.stat-val.teal{color:var(--teal)}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:11px}
.form-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.form-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.form-label span{color:var(--red);margin-left:2px}
input[type=text],input[type=date],input[type=number],select{width:100%;padding:8px 11px;font-size:13px;border:1px solid var(--border2);border-radius:var(--r2);background:var(--bg3);color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
select option{background:var(--bg3)}input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r2);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;white-space:nowrap}
.btn:hover{color:var(--text);background:var(--bg4)}.btn:active{transform:scale(.97)}
.btn-accent{background:var(--accent);color:#fff;border-color:transparent}.btn-accent:hover{background:var(--accent2);color:#fff}
.btn-green{background:var(--green-dim);color:var(--green);border-color:rgba(45,212,160,.25)}.btn-green:hover{background:rgba(45,212,160,.2)}
.btn-blue{background:var(--blue-dim);color:var(--blue);border-color:rgba(90,156,245,.25)}.btn-blue:hover{background:rgba(90,156,245,.2)}
.btn-teal{background:var(--teal-dim);color:var(--teal);border-color:rgba(34,211,238,.25)}.btn-teal:hover{background:rgba(34,211,238,.2)}
.btn-amber{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,166,35,.25)}
.btn-red{background:var(--red-dim);color:var(--red);border-color:rgba(245,90,90,.25)}.btn-red:hover{background:rgba(245,90,90,.2)}
.btn-sm{padding:5px 10px;font-size:11px}
.alert{padding:9px 13px;border-radius:var(--r2);font-size:12px;margin-bottom:11px;display:none}
.alert.show{display:flex;align-items:center;gap:8px}
.alert-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(45,212,160,.25)}
.alert-warn{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,.25)}
.alert-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(245,90,90,.25)}
.alert-info{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(90,156,245,.25)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:7px 11px;text-align:left;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.06em;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase}
td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap;transition:background .1s}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg3);color:var(--text)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:10px;font-family:'DM Mono',monospace;font-weight:500}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(45,212,160,.2)}
.badge-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(245,90,90,.2)}
.badge-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(90,156,245,.2)}
.badge-purple{background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(124,110,245,.2)}
.badge-teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(34,211,238,.2)}
.upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:11px}
.upload-box{border:1px dashed var(--border2);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:var(--bg3)}
.upload-box:hover{border-color:var(--accent);background:var(--accent-glow)}
.upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-box.loaded{border-style:solid;border-color:var(--green);background:var(--green-dim)}
.ub-icon{font-size:20px;margin-bottom:5px}.ub-name{font-size:12px;font-weight:500;color:var(--text);font-family:'Syne',sans-serif}.ub-status{font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace}
.upload-box.loaded .ub-status{color:var(--green)}
.sku-wrap{position:relative}
.sku-sug,.bahan-sug{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);z-index:30;max-height:160px;overflow-y:auto;display:none;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.sku-item{padding:8px 12px;font-size:12px;cursor:pointer;color:var(--text2);transition:all .1s}.sku-item:hover{background:var(--bg4);color:var(--text)}
.stok-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:4px;min-width:60px}
.stok-fill{height:100%;border-radius:2px;background:var(--green)}.stok-fill.warn{background:var(--amber)}.stok-fill.danger{background:var(--red)}
.loader-bar{background:var(--green-dim);border:1px solid rgba(45,212,160,.25);border-radius:var(--r2);padding:8px 14px;font-size:12px;color:var(--green);display:none;align-items:center;gap:8px;margin-bottom:12px}
.loader-bar.show{display:flex}
.spinner{width:13px;height:13px;border:2px solid rgba(45,212,160,.3);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.code-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;font-size:11px;line-height:1.7;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:480px;overflow-y:auto;font-family:'DM Mono',monospace;color:var(--text2)}
.gudang-chips{display:flex;flex-wrap:wrap;gap:8px}
.gudang-chip{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:var(--r2);font-size:12px;font-weight:500;background:var(--bg4);border:1px solid var(--border2);color:var(--text)}
.gudang-chip .remove{cursor:pointer;color:var(--text3);font-size:10px;transition:color .15s}.gudang-chip .remove:hover{color:var(--red)}
.toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.filter-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:12px;font-family:'DM Mono',monospace}
.hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.6;font-family:'DM Mono',monospace}
.steps{display:flex;flex-direction:column;gap:10px}
.step{display:flex;gap:12px;align-items:flex-start}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent-glow);border:1px solid rgba(124,110,245,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'DM Mono',monospace;color:var(--accent2);flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text2);line-height:1.5}.step-text b{color:var(--text)}
.bahan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.bahan-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.bahan-name{font-size:13px;font-weight:500;color:var(--text)}
.bahan-unit{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.bahan-input-row{display:flex;gap:6px;align-items:center}
.bahan-qty-input{flex:1;padding:6px 8px;font-size:13px;border:1px solid var(--border2);border-radius:var(--r2);background:var(--bg4);color:var(--text);text-align:center;outline:none}
.bahan-qty-input:focus{border-color:var(--teal);box-shadow:0 0 0 2px rgba(34,211,238,.15)}
.btn-catat{padding:6px 10px;border-radius:var(--r2);font-size:11px;cursor:pointer;border:1px solid rgba(34,211,238,.3);background:var(--teal-dim);color:var(--teal);font-weight:500;transition:all .15s;white-space:nowrap}
.btn-catat:hover{background:rgba(34,211,238,.2)}.btn-catat:active{transform:scale(.96)}
.opname-input{width:90px;padding:5px 8px;font-size:12px;border:1px solid var(--border2);border-radius:var(--r2);background:var(--bg4);color:var(--text);text-align:center;outline:none;font-family:'DM Mono',monospace}
.opname-input:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(245,166,35,.15)}
.selisih-plus{color:var(--green);font-weight:600;font-family:'DM Mono',monospace}
.selisih-minus{color:var(--red);font-weight:600;font-family:'DM Mono',monospace}
.info-box{background:var(--blue-dim);border:1px solid rgba(90,156,245,.2);border-radius:var(--r2);padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:12px;line-height:1.6}
/* ── CAMERA SCANNER ───────────────────────────────── */
.cam-wrap{position:relative;width:100%;max-width:360px;margin:0 auto 12px;border-radius:var(--r);overflow:hidden;background:#000;aspect-ratio:1}
.cam-video{width:100%;height:100%;object-fit:cover;display:block}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-finder{width:65%;aspect-ratio:1;border:2px solid rgba(255,255,255,.7);border-radius:8px;position:relative;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
.cam-finder::before,.cam-finder::after{content:'';position:absolute;width:22px;height:22px;border-color:var(--green);border-style:solid}
.cam-finder::before{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:6px 0 0 0}
.cam-finder::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 6px 0}
.cam-finder-br{position:absolute;bottom:-2px;left:-2px;width:22px;height:22px;border:3px solid var(--green);border-width:0 0 3px 3px;border-radius:0 0 0 6px}
.cam-finder-tr{position:absolute;top:-2px;right:-2px;width:22px;height:22px;border:3px solid var(--green);border-width:3px 3px 0 0;border-radius:0 6px 0 0}
.cam-scan-line{position:absolute;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:scan-sweep 1.8s ease-in-out infinite}
@keyframes scan-sweep{0%{top:10%}50%{top:88%}100%{top:10%}}
.cam-status{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);padding:7px 10px;font-size:11px;font-family:'DM Mono',monospace;color:#fff;text-align:center}
.cam-btn-wrap{display:flex;gap:8px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.cam-toggle{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:99px;font-size:13px;cursor:pointer;border:2px solid var(--accent);background:var(--accent-glow);color:var(--accent2);font-weight:500;transition:all .2s}
.cam-toggle.active{background:var(--accent);color:#fff}
.cam-toggle:hover{background:var(--accent)}
.input-or{display:flex;align-items:center;gap:8px;margin:8px 0;color:var(--text3);font-size:11px;font-family:'DM Mono',monospace}
.input-or::before,.input-or::after{content:'';flex:1;height:1px;background:var(--border)}

.pack-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.pack-modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.pack-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:5}
.pack-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.pack-resi{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-top:3px}
.pack-body{padding:16px 20px;flex:1}
.pack-item{border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:10px;transition:all .2s;position:relative;overflow:hidden}
.pack-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border)}
.pack-item.ok::before{background:var(--green)}
.pack-item.partial::before{background:var(--amber)}
.pack-item.wrong{border-color:var(--red);background:var(--red-dim)}
.pack-item.wrong::before{background:var(--red)}
.pack-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.pack-sku{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent2)}
.pack-nama{font-size:13px;font-weight:500;color:var(--text);margin-top:2px}
.pack-qty-info{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;text-align:right;white-space:nowrap}
.pack-qty-scan{font-size:22px;font-weight:700;font-family:'Syne',sans-serif;text-align:right}
.pack-qty-scan.ok{color:var(--green)}
.pack-qty-scan.partial{color:var(--amber)}
.pack-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.pack-progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width .3s}
.pack-progress-fill.partial{background:var(--amber)}
.pack-scan-row{padding:16px 20px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--bg2)}
.pack-scan-input{width:100%;padding:12px 14px;font-size:15px;border:2px solid var(--border2);border-radius:var(--r2);background:var(--bg3);color:var(--text);font-family:'DM Mono',monospace;outline:none;transition:border-color .15s,box-shadow .15s;letter-spacing:.04em}
.pack-scan-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.pack-scan-input.error{border-color:var(--red);box-shadow:0 0 0 3px var(--red-dim);animation:shake .3s}
.pack-scan-input.success{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.pack-footer{display:flex;gap:8px;justify-content:flex-end;padding:12px 20px;border-top:1px solid var(--border)}
.pack-done-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:11px;background:var(--green-dim);color:var(--green);border:1px solid rgba(45,212,160,.25);font-family:'DM Mono',monospace}

@media(max-width:700px){.sidebar{width:52px}.brand-text,.brand-sub,.conn-pill,.nav-section{display:none}.brand-logo-wrap{justify-content:center}.nav-item{justify-content:center;padding:10px}.nav-item span:last-child{display:none}.content{padding:12px}.topbar{padding:11px 14px}}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">

function buildSidebar(){
  const sections={config:'Konfigurasi',data:'Operasional',database:'Database'};
  const nav=document.getElementById('sidebar-nav');
  let html='';let lastSec='';
  TABS.forEach(t=>{
    if(t.section!==lastSec){html+=`<div class="nav-section">${sections[t.section]}</div>`;lastSec=t.section;}
    html+=`<div class="nav-item${t.id===activeTab?' active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')"><span class="nav-icon">${t.icon}</span><span>${t.label}</span></div>`;
  });
  nav.innerHTML=html;
}

function switchTab(name){
  activeTab=name;
  const tab=TABS.find(t=>t.id===name);
  document.getElementById('page-title').textContent=tab?.label||name;
  document.getElementById('page-sub').textContent=tab?.sub||'';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab===name));
  TABS.forEach(t=>{const p=document.getElementById('panel-'+t.id);if(p)p.style.display=t.id===name?'block':'none';});
  if(name==='stok')renderStok();
  if(name==='stokbahan')renderStokBahan();
  if(name==='opname'){setDefDate('opname-tanggal');renderOpnameHistory();}
  if(name==='saldo')renderSaldoAwal();
  if(name==='dbkeluar')renderDBK();
  if(name==='dbmasuk')renderDBM();
  if(name==='dbbahanmasuk')renderDBBM();
  if(name==='dbpakai')renderDBP();
  if(name==='gudang')renderGudangList();
  if(name==='masuk'){setDefDate('masuk-tanggal');renderTodayMasuk();}
  if(name==='bahanmasuk'){setDefDate('bm-tanggal');renderTodayBahanMasuk();}
  if(name==='pakai'){setDefDate('pakai-tanggal');renderBahanGrid();renderTodayPakai();}
  if(name==='apscode')renderScript();
}

// ─── UTILS ────────────────────────────────────────────
const norm=v=>v?String(v).trim().replace(/\s+/g,'').toUpperCase():'';
const s=v=>String(v==null?'':v);
const today=()=>new Date().toISOString().split('T')[0];
const getBulan=t=>{try{return new Date(t).toLocaleString('id-ID',{month:'long'});}catch{return'';}};
const getCol=(id,def)=>{const v=parseInt(document.getElementById(id)?.value);return isNaN(v)?def:v;};
function showAlert(id,type,msg){const el=document.getElementById(id);if(!el)return;const icons={success:'✓',warn:'⚠',danger:'✕',info:'ℹ'};el.className='alert alert-'+type+' show';el.innerHTML=`<span>${icons[type]||'•'}</span><span>${msg}</span>`;if(type!=='danger')setTimeout(()=>el.classList.remove('show'),4500);}
function setConn(st2,label){const dot=document.getElementById('conn-dot');const lbl=document.getElementById('conn-label');if(dot)dot.className='conn-dot'+(st2?' '+st2:'');if(lbl)lbl.textContent=label;}
function showLoader(msg){const b=document.getElementById('loader-bar');const m=document.getElementById('loader-msg');if(b)b.classList.add('show');if(m)m.textContent=msg||'Memuat...';}
function hideLoader(){const b=document.getElementById('loader-bar');if(b)b.classList.remove('show');}
function makeStat(label,val,cls){return`<div class="stat-card ${cls||''}"><div class="stat-label">${label}</div><div class="stat-val ${cls||''}">${val}</div></div>`;}
function setDefDate(id){const el=document.getElementById(id);if(el&&!el.value)el.value=today();}
function getSaldo(tipe,kode,gudang,bulanLabel){const ov=st.saldoAwal.find(s=>s.tipe===tipe&&norm(s.kode)===norm(kode)&&s.gudang===gudang&&s.bulan===bulanLabel&&s.override);if(ov)return Number(ov.qty)||0;const nm=st.saldoAwal.find(s=>s.tipe===tipe&&norm(s.kode)===norm(kode)&&s.gudang===gudang&&s.bulan===bulanLabel);return nm?Number(nm.qty)||0:0;}
function bulanBerikutnya(bl){const months=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];const parts=bl.trim().split(' ');if(parts.length<2)return'';const idx=months.findIndex(m=>m.toLowerCase()===parts[0].toLowerCase());if(idx===-1)return'';return months[(idx+1)%12]+' '+(idx===11?Number(parts[1])+1:Number(parts[1]));}
function currentBulanLabel(){const now=new Date();return now.toLocaleString('id-ID',{month:'long'})+' '+now.getFullYear();}

// ─── API ──────────────────────────────────────────────
async function connectAndLoad(){
  const url=document.getElementById('api-url').value.trim();if(!url){showAlert('alert-setting','warn','Masukkan URL.');return;}
  st.apiUrl=url;setConn('loading','Menghubungkan...');showAlert('alert-setting','info','Menghubungkan...');
  try{const r=await fetch(url+'?action=ping');const d=await r.json();if(d.status==='ok'){st.connected=true;setConn('ok','Terhubung');showAlert('alert-setting','success','Terhubung! Memuat data...');await fullSync();}else throw new Error(d.message||'Gagal');}
  catch(e){st.connected=false;setConn('err','Gagal');showAlert('alert-setting','danger','Gagal: '+e.message);}
}
async function fullSync(){
  if(!st.apiUrl)return;showLoader('Memuat data...');
  try{
    const r=await fetch(st.apiUrl+'?action=getAll');const d=await r.json();
    if(d.master){st.master={};d.master.forEach(row=>{const k=norm(Array.isArray(row)?row[0]:row.varianSKU);if(!k)return;if(!st.master[k])st.master[k]=[];st.master[k].push({sku:s(Array.isArray(row)?row[1]:row.sku),nama:s(Array.isArray(row)?row[2]:row.namaBarang),qty:Number(Array.isArray(row)?row[3]:row.qty)||1,barcode:norm(Array.isArray(row)?row[4]:row.Barcode||row.barcode||row.kode_barcode||'')});});}
    if(d.gudang){const list=d.gudang.map(g=>{if(typeof g==='string')return g.trim();if(Array.isArray(g))return s(g[0]).trim();if(g&&typeof g==='object')return s(g.nama||g.name||Object.values(g)[0]||'').trim();return'';}).filter(Boolean);st.gudangList=[...new Set(list)];}
    if(d.bahan)st.masterBahan=d.bahan.map(b=>({nama:s(b.nama||b[0]),satuan:s(b.satuan||b[1])})).filter(b=>b.nama);
    if(d.dbK)st.dbK=d.dbK;if(d.dbM)st.dbM=d.dbM;if(d.dbBM)st.dbBM=d.dbBM;if(d.dbP)st.dbP=d.dbP;if(d.dbOpname)st.dbOpname=d.dbOpname;if(d.saldoAwal)st.saldoAwal=d.saldoAwal;
    renderAllGudangDD();renderGudangList();renderListBahan();populateBulanFilters();
    setConn('ok','Terhubung · '+new Date().toLocaleTimeString('id-ID'));st.connected=true;hideLoader();
  }catch(e){hideLoader();setConn('err','Gagal sync');console.error(e);}
}
async function apiPost(body){if(!st.apiUrl)return{status:'error',message:'Belum terhubung'};try{const r=await fetch(st.apiUrl,{method:'POST',body:JSON.stringify(body)});return await r.json();}catch(e){return{status:'error',message:e.message};}}
async function pushAllToSheets(){if(!st.apiUrl){showAlert('alert-setting','warn','Hubungkan dulu.');return;}showAlert('alert-setting','info','Mengirim...');const d=await apiPost({action:'replaceAll',dbK:st.dbK,dbM:st.dbM,dbBM:st.dbBM,dbP:st.dbP,dbOpname:st.dbOpname,saldoAwal:st.saldoAwal,gudang:st.gudangList,bahan:st.masterBahan});showAlert('alert-setting',d.status==='ok'?'success':'danger',d.message||'Selesai.');}

// ─── FILE UPLOAD ──────────────────────────────────────
const readBuf=f=>new Promise((r,j)=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.onerror=j;fr.readAsArrayBuffer(f);});
const readTxt=f=>new Promise((r,j)=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.onerror=j;fr.readAsText(f,'utf-8');});
function parseCSV(txt){return txt.split(/\r?\n/).filter(l=>l.trim()).map(line=>{const cells=[];let cur='';let inQ=false;for(const c of line){if(c==='"')inQ=!inQ;else if((c===','||c===';')&&!inQ){cells.push(cur.trim());cur='';}else cur+=c;}cells.push(cur.trim());return cells;});}
async function loadFile(e,type){const file=e.target.files[0];if(!file)return;const ext=file.name.split('.').pop().toLowerCase();let rows=[];try{if(ext==='csv')rows=parseCSV(await readTxt(file));else{const buf=await readBuf(file);const wb=XLSX.read(buf,{type:'array'});rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});}const data=rows.slice(1).filter(r=>r.some(c=>c!==''));if(type==='bigseller'){st.bigseller=data;document.getElementById('st-bigseller').textContent=data.length+' baris dimuat';document.getElementById('box-bigseller').classList.add('loaded');}}catch(err){alert('Error: '+err.message);}}

function renderAllGudangDD(){
  ['pilih-gudang','masuk-gudang','bm-gudang','pakai-gudang','opname-gudang','saldo-gudang'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;const cur=el.value;
    el.innerHTML='<option value="">— Pilih —</option>'+st.gudangList.map(g=>`<option value="${g}"${g===cur?' selected':''}>${g}</option>`).join('');

async function saveBahanMasuk(){
  const tanggal=document.getElementById('bm-tanggal').value;
  const gudang=document.getElementById('bm-gudang').value;
  const nama=document.getElementById('bm-nama').value.trim();
  const satuan=document.getElementById('bm-satuan').value.trim();
  const qty=Number(document.getElementById('bm-qty').value);
  const supplier=document.getElementById('bm-supplier').value.trim();
  const harga=Number(document.getElementById('bm-harga').value)||0;
  const catatan=document.getElementById('bm-catatan').value.trim();
  if(!tanggal||!nama||!qty||qty<=0){showAlert('alert-bm','warn','Tanggal, nama bahan, dan qty wajib diisi.');return;}
  if(!gudang){showAlert('alert-bm','warn','Pilih gudang.');return;}
  const bulan=getBulan(tanggal);
  const total=qty*harga;
  const row={tanggal,bulan,nama,satuan,qty,supplier,harga,total,gudang,catatan};
  st.dbBM.push(row);st.todayBahanMasuk.push(row);

  showAlert('alert-bm',d.status==='ok'?'success':'warn',d.status==='ok'?`✓ ${nama} ×${qty} tersimpan!`:'Lokal OK, gagal sync: '+d.message);

}

async function catatSatu(i){

  st.dbP.push(row);st.todayPakai.push(row);if(qtyEl)qtyEl.value='';renderTodayPakai();

// ─── STOK PRODUK ─────────────────────────────────────
function renderStok(){
  const filter=norm(document.getElementById('stok-filter')?.value||'');const gudangF=document.getElementById('stok-gudang')?.value||'';const statusF=document.getElementById('stok-status')?.value||'';const bulanF=document.getElementById('stok-bulan')?.value||currentBulanLabel();
  populateBulanFilters();
  const keys=new Set();st.dbM.forEach(r=>keys.add((r.sku||'')+'||'+(r.gudang||'')));st.dbK.forEach(r=>keys.add((r.sku||'')+'||'+(r.gudang||'')));
  const gudangs=[...new Set([...st.dbM,...st.dbK].map(r=>r.gudang).filter(Boolean))];
  const selG=document.getElementById('stok-gudang');if(selG)selG.innerHTML='<option value="">Semua gudang</option>'+gudangs.map(g=>`<option value="${g}"${g===gudangF?' selected':''}>${g}</option>`).join('');
  let rows=[...keys].map(key=>{const[sku,gudang]=key.split('||');const saldo=getSaldo('produk',sku,gudang,bulanF);const masuk=st.dbM.filter(r=>norm(r.sku)===norm(sku)&&r.gudang===gudang&&(r.bulan+' '+(r.tanggal?new Date(r.tanggal).getFullYear():''))===bulanF).reduce((a,r)=>a+Number(r.qty),0);const keluar=st.dbK.filter(r=>norm(r.sku)===norm(sku)&&r.gudang===gudang&&(r.bulan+' '+(r.tanggal?new Date(r.tanggal).getFullYear():''))===bulanF).reduce((a,r)=>a+Number(r.qty),0);const nama=st.master[norm(sku)]?.[0]?.nama||sku;return{sku,gudang,nama,saldo,masuk,keluar,sisa:saldo+masuk-keluar};});
  if(filter)rows=rows.filter(r=>norm(r.sku).includes(filter)||norm(r.nama).includes(filter));if(gudangF)rows=rows.filter(r=>r.gudang===gudangF);if(statusF==='aman')rows=rows.filter(r=>r.sisa>10);else if(statusF==='menipis')rows=rows.filter(r=>r.sisa>0&&r.sisa<=10);else if(statusF==='habis')rows=rows.filter(r=>r.sisa<=0);rows.sort((a,b)=>a.sisa-b.sisa);
  const tbody=document.getElementById('stok-body');if(!rows.length){tbody.innerHTML='<tr><td colspan="8" class="empty">Belum ada data.</td></tr>';document.getElementById('stok-stats').innerHTML='';return;}
  const maxM=Math.max(...rows.map(r=>r.saldo+r.masuk),1);
  tbody.innerHTML=rows.map(r=>{const pct=Math.min(100,Math.max(0,Math.round(r.sisa/maxM*100)));const cls=r.sisa<=0?'danger':r.sisa<=10?'warn':'';const badge=r.sisa<=0?'<span class="badge badge-red">Habis</span>':r.sisa<=10?'<span class="badge badge-amber">Menipis</span>':'<span class="badge badge-green">Aman</span>';return`<tr><td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent2)">${r.sku}</td><td>${r.nama}</td><td><span class="badge badge-purple">${r.gudang||'-'}</span></td><td style="color:var(--teal)">${r.saldo}</td><td>${r.masuk}</td><td>${r.keluar}</td><td><b style="color:${r.sisa<=0?'var(--red)':r.sisa<=10?'var(--amber)':'var(--green)'}">${r.sisa}</b><div class="stok-bar"><div class="stok-fill ${cls}" style="width:${pct}%"></div></div></td><td>${badge}</td></tr>`;}).join('');
  const habis=rows.filter(r=>r.sisa<=0).length,menipis=rows.filter(r=>r.sisa>0&&r.sisa<=10).length;
  document.getElementById('stok-stats').innerHTML=makeStat('Total SKU',rows.length,'')+makeStat('Sisa',rows.reduce((a,r)=>a+r.sisa,0),'green')+makeStat('Menipis',menipis,'amber')+makeStat('Habis',habis,'red');

function renderStokBahan(){
  const filter=norm(document.getElementById('stokb-filter')?.value||'');const gudangF=document.getElementById('stokb-gudang')?.value||'';const bulanF=document.getElementById('stokb-bulan')?.value||currentBulanLabel();

  let rows=[...keys].map(key=>{

  const total=rows.reduce((a,r)=>a+r.sisa,0);const habis=rows.filter(r=>r.sisa<=0).length;

// ─── PACKING MODE ─────────────────────────────────────
// packState: array of {sku, barcode, nama, qty, scanned:0}
let packState=[];

function launchPackingMode(items){
  // Build packState — group by sku, resolve barcode from master
  const map={};
  for(const item of items){
    const masterItems=Object.values(st.master).flat();
    const barcodeEntry=masterItems.find(m=>norm(m.sku)===norm(item.sku));
    const barcode=barcodeEntry?.barcode||'';
    const key=norm(item.sku);
    if(!map[key])map[key]={sku:item.sku,nama:item.nama,barcode,qtyRequired:0,scanned:0};
    map[key].qtyRequired+=Number(item.qty)||0;
  }
  packState=Object.values(map);
  renderPackingModal();
}

function buildBarcodeIndex(){
  // barcode → sku lookup from master
  const idx={};
  for(const [varianSku,items] of Object.entries(st.master)){
    for(const it of items){
      if(it.barcode){const bc=norm(it.barcode);if(!idx[bc])idx[bc]=[];idx[bc].push(norm(it.sku));}
    }
  }
  return idx;
}

function beepOk(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=880;g.gain.setValueAtTime(.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);o.start();o.stop(ac.currentTime+.15);}catch(e){}}
function beepError(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=220;g.gain.setValueAtTime(.4,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.4);o.start();o.stop(ac.currentTime+.4);}catch(e){}}

// ─── CAMERA BARCODE SCANNER ───────────────────────────
let cameraActive=false;
let codeReader=null;
let camStream=null;

async function toggleCamera(){
  if(cameraActive){stopCamera();return;}
  await startCamera();
}

async function startCamera(){
  const btn=document.getElementById('cam-toggle-btn');
  const wrap=document.getElementById('cam-wrap-container');
  const video=document.getElementById('cam-video');
  const status=document.getElementById('cam-status');
  if(!btn||!wrap||!video)return;

  // Check ZXing available
  if(!window.ZXing){
    showPackAlert('danger','❌ Library barcode tidak tersedia. Coba refresh halaman.');
    return;
  }

  try{
    btn.textContent='⏳ Membuka kamera...';
    btn.classList.add('active');

    // Request camera (prefer rear camera on mobile)
    camStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}
    });
    video.srcObject=camStream;
    await video.play();

    wrap.style.display='block';
    btn.textContent='🛑 Matikan Kamera';
    cameraActive=true;

    // Init ZXing reader
    const hints=new Map();
    const formats=[
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,formats);
    hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
    codeReader=new ZXing.BrowserMultiFormatReader(hints,300);

    if(status)status.textContent='Arahkan kamera ke barcode produk';

    // Continuous decode loop
    decodeContinuously();
  } catch(err){
    stopCamera();
    if(err.name==='NotAllowedError'){
      showPackAlert('danger','❌ Izin kamera ditolak. Buka pengaturan browser dan izinkan kamera.');
    } else {
      showPackAlert('warn','⚠ Tidak bisa membuka kamera: '+err.message);
    }
  }
}

let lastScannedValue='';
let lastScannedTime=0;

async function decodeContinuously(){
  const video=document.getElementById('cam-video');
  const status=document.getElementById('cam-status');
  if(!codeReader||!video||!cameraActive)return;

  try{
    const result=await codeReader.decodeOnceFromVideoElement(video);
    if(result&&cameraActive){
      const val=result.getText();
      const now=Date.now();
      // Debounce: ignore same barcode within 2 seconds
      if(val===lastScannedValue&&(now-lastScannedTime)<2000){
        if(cameraActive)setTimeout(decodeContinuously,200);
        return;
      }
      lastScannedValue=val;
      lastScannedTime=now;
      if(status)status.textContent='✓ Terbaca: '+val;
      // Vibrate on mobile
      if(navigator.vibrate)navigator.vibrate(60);
      // Process the scanned value
      processScannedBarcode(val);
      // Continue scanning
      if(cameraActive)setTimeout(decodeContinuously,500);
    }
  } catch(err){
    // No barcode found yet — keep looping silently
    if(cameraActive)setTimeout(decodeContinuously,300);
  }
}

function stopCamera(){
  cameraActive=false;
  if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const video=document.getElementById('cam-video');
  if(video){video.srcObject=null;}
  const wrap=document.getElementById('cam-wrap-container');
  if(wrap)wrap.style.display='none';
  const btn=document.getElementById('cam-toggle-btn');
  if(btn){btn.textContent='📷 Aktifkan Kamera';btn.classList.remove('active');}
}

function processScannedBarcode(val){
  const normalized=norm(val);
  const idx=buildBarcodeIndex();
  const matchedSkus=idx[normalized]||[];
  const directSku=packState.find(p=>norm(p.sku)===normalized||norm(p.barcode)===normalized);
  if(directSku)matchedSkus.push(norm(directSku.sku));
  const uniqueSkus=[...new Set(matchedSkus)];
  const matched=packState.find(p=>uniqueSkus.includes(norm(p.sku)));
  const status=document.getElementById('cam-status');

  if(!matched){
    beepError();
    if(navigator.vibrate)navigator.vibrate([100,50,100]);
    if(status)status.textContent='❌ Barcode tidak cocok: '+val;
    showPackAlert('danger','❌ Barcode tidak cocok dengan pesanan ini!');
    return;
  }
  if(matched.scanned>=matched.qtyRequired){
    beepError();
    if(status)status.textContent='⚠ Sudah lengkap: '+matched.nama;
    showPackAlert('warn','⚠ '+matched.nama+' sudah lengkap!');
    return;
  }
  // SUCCESS
  matched.scanned++;
  beepOk();
  if(status)status.textContent='✅ '+matched.nama+' ('+matched.scanned+'/'+matched.qtyRequired+')';

  // Update item card UI
  const i=packState.indexOf(matched);
  const isDone=matched.scanned>=matched.qtyRequired;
  const pct=Math.min(100,Math.round((matched.scanned/matched.qtyRequired)*100));
  const scanEl=document.getElementById('pack-scanned-'+i);
  const progEl=document.getElementById('pack-prog-'+i);
  const itemEl=document.getElementById('pack-item-'+i);
  if(scanEl){scanEl.textContent=matched.scanned;scanEl.className='pack-qty-scan'+(isDone?' ok':' partial');}
  if(progEl){progEl.style.width=pct+'%';if(isDone)progEl.classList.remove('partial');}
  if(itemEl){itemEl.className='pack-item'+(isDone?' ok':' partial');}
  if(isDone){
    const topEl=itemEl?.querySelector('.pack-item-top>div:last-child');
    if(topEl&&!topEl.querySelector('.pack-done-badge'))topEl.insertAdjacentHTML('beforeend','<div class="pack-done-badge" style="margin-top:4px">✓ Lengkap</div>');
    // Scroll to next incomplete item
    const nextItem=packState.find(p=>p.scanned<p.qtyRequired);
    if(nextItem){const ni=packState.indexOf(nextItem);document.getElementById('pack-item-'+ni)?.scrollIntoView({behavior:'smooth',block:'center'});}
  }
  // Check all done
  const allDone=packState.every(p=>p.scanned>=p.qtyRequired);
  if(allDone){
    const saveBtn=document.getElementById('pack-save-btn');
    const hint=document.getElementById('pack-hint-text');
    if(saveBtn){saveBtn.disabled=false;saveBtn.removeAttribute('style');}
    if(hint){hint.textContent='✅ Semua item lengkap! Siap disimpan.';hint.style.color='var(--green)';}
    if(status)status.textContent='🎉 Semua item lengkap!';
    if(navigator.vibrate)navigator.vibrate([100,50,100,50,200]);
  }
}

// ─── APPS SCRIPT v7 ───────────────────────────────────
const SCRIPT_CODE=`// BRM Warehouse — Apps Script v7
// + Database Bahan Masuk (pembelian bahan)
const SH={
  MASTER:"Master SKU", GUDANG:"Gudang", BAHAN:"Master Bahan",
  KELUAR:"Database Barang Keluar", MASUK:"Database Barang Masuk",
  BAHANMASUK:"Database Bahan Masuk",
  PAKAI:"Database Pemakaian", OPNAME:"Database Opname",
  SALDO:"Saldo Awal"
};

function doGet(e){
  const a=e.parameter.action;
  if(a==="ping") return json({status:"ok",message:"Spreadsheet terhubung!"});
  if(a==="getAll") return json({
    master:    getMasterRaw(),
    gudang:    getGudangList(),
    bahan:     getBahanList(),
    dbK:       getMapped(SH.KELUAR),
    dbM:       getMapped(SH.MASUK),
    dbBM:      getMapped(SH.BAHANMASUK),
    dbP:       getMapped(SH.PAKAI),
    dbOpname:  getMapped(SH.OPNAME),
    saldoAwal: getMapped(SH.SALDO)
  });
  return json({status:"error",message:"Action tidak dikenal"});
}

function doPost(e){
  try{
    const b=JSON.parse(e.postData.contents);
    if(b.action==="appendKeluar"){
      appendRows(SH.KELUAR,b.rows,["bulan","tanggal","noPesanan","sku","nama","qty","resi","ekspedisi","platform","gudang"]);
      return json({status:"ok",message:"Data keluar tersimpan"});
    }
    if(b.action==="appendMasuk"){
      appendRows(SH.MASUK,b.rows,["tanggal","bulan","sku","nama","qty","supplier","gudang","catatan"]);
      return json({status:"ok",message:"Data masuk tersimpan"});
    }
    if(b.action==="appendBahanMasuk"){
      appendRows(SH.BAHANMASUK,b.rows,["tanggal","bulan","nama","satuan","qty","supplier","harga","total","gudang","catatan"]);
      return json({status:"ok",message:"Bahan masuk tersimpan"});
    }
    if(b.action==="appendPakai"){
      appendRows(SH.PAKAI,b.rows,["tanggal","bulan","nama","satuan","qty","gudang","catatan"]);
      return json({status:"ok",message:"Pemakaian tersimpan"});
    }
    if(b.action==="appendOpname"){
      appendRows(SH.OPNAME,b.rows,["tanggal","bulan","gudang","tipe","kode","nama","sisaSistem","aktual","selisih","keterangan"]);
      return json({status:"ok",message:"Opname tersimpan"});
    }
    if(b.action==="saveSaldoAwal"){
      replaceSheet(SH.SALDO,b.saldoAwal,["tipe","kode","gudang","bulan","qty","override","sumber"]);
      return json({status:"ok",message:"Saldo awal tersimpan: "+b.saldoAwal.length+" item"});
    }
    if(b.action==="saveGudang"){
      const sh=getOrCreate(SH.GUDANG);sh.clearContents();sh.appendRow(["nama"]);
      b.gudang.forEach(g=>sh.appendRow([g]));
      return json({status:"ok",message:"Gudang tersimpan"});
    }
    if(b.action==="saveBahan"){
      const sh=getOrCreate(SH.BAHAN);sh.clearContents();sh.appendRow(["nama","satuan"]);
      b.bahan.forEach(x=>sh.appendRow([x.nama,x.satuan||""]));
      return json({status:"ok",message:"Master bahan tersimpan"});
    }
    if(b.action==="replaceAll"){
      replaceSheet(SH.KELUAR,b.dbK||[],["bulan","tanggal","noPesanan","sku","nama","qty","resi","ekspedisi","platform","gudang"]);
      replaceSheet(SH.MASUK,b.dbM||[],["tanggal","bulan","sku","nama","qty","supplier","gudang","catatan"]);
      replaceSheet(SH.BAHANMASUK,b.dbBM||[],["tanggal","bulan","nama","satuan","qty","supplier","harga","total","gudang","catatan"]);
      replaceSheet(SH.PAKAI,b.dbP||[],["tanggal","bulan","nama","satuan","qty","gudang","catatan"]);
      replaceSheet(SH.OPNAME,b.dbOpname||[],["tanggal","bulan","gudang","tipe","kode","nama","sisaSistem","aktual","selisih","keterangan"]);
      replaceSheet(SH.SALDO,b.saldoAwal||[],["tipe","kode","gudang","bulan","qty","override","sumber"]);
      if(b.gudang){const sh=getOrCreate(SH.GUDANG);sh.clearContents();sh.appendRow(["nama"]);b.gudang.forEach(g=>sh.appendRow([g]));}
      if(b.bahan){const sh=getOrCreate(SH.BAHAN);sh.clearContents();sh.appendRow(["nama","satuan"]);b.bahan.forEach(x=>sh.appendRow([x.nama,x.satuan||""]));}
      return json({status:"ok",message:"Semua data berhasil di-push"});
    }
    return json({status:"error",message:"Action tidak dikenal"});
  }catch(err){return json({status:"error",message:err.message});}
}

function getMasterRaw(){const sh=SpreadsheetApp.getActive().getSheetByName(SH.MASTER);if(!sh||sh.getLastRow()<2)return[];return sh.getDataRange().getValues().slice(1).filter(r=>r[0]!=="");}
function getGudangList(){const sh=SpreadsheetApp.getActive().getSheetByName(SH.GUDANG);if(!sh||sh.getLastRow()<2)return[];return sh.getDataRange().getValues().slice(1).map(r=>String(r[0]||"").trim()).filter(Boolean);}
function getBahanList(){const sh=SpreadsheetApp.getActive().getSheetByName(SH.BAHAN);if(!sh||sh.getLastRow()<2)return[];return sh.getDataRange().getValues().slice(1).filter(r=>r[0]).map(r=>({nama:String(r[0]||"").trim(),satuan:String(r[1]||"").trim()}));}
function getMapped(sheetName){const sh=SpreadsheetApp.getActive().getSheetByName(sheetName);if(!sh||sh.getLastRow()<2)return[];const data=sh.getDataRange().getValues();const headers=data[0].map(h=>String(h).trim());return data.slice(1).filter(r=>r.some(c=>c!=="")).map(row=>{const obj={};headers.forEach((h,i)=>obj[h]=row[i]);return obj;});}
function getOrCreate(n){const ss=SpreadsheetApp.getActive();return ss.getSheetByName(n)||ss.insertSheet(n);}
function appendRows(n,rows,keys){const sh=getOrCreate(n);if(sh.getLastRow()===0)sh.appendRow(keys);rows.forEach(r=>sh.appendRow(keys.map(k=>r[k]!==undefined?r[k]:"")));}
function replaceSheet(n,rows,keys){const sh=getOrCreate(n);sh.clearContents();sh.appendRow(keys);(rows||[]).forEach(r=>sh.appendRow(keys.map(k=>r[k]!==undefined?r[k]:"")));}
function json(obj){return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);}`;

function renderScript(){const el=document.getElementById('script-code');if(el)el.textContent=SCRIPT_CODE;}
function copyScript(){navigator.clipboard.writeText(SCRIPT_CODE).then(()=>showAlert('alert-copy','success','Kode berhasil disalin!')).catch(()=>showAlert('alert-copy','warn','Gagal — select manual lalu copy.'));}

buildPanels();buildSidebar();switchTab('setting');
